global:
  imagePullSecrets: []

replicaCount: 1

image:
  repository: de.icr.io/roks/vpc-network-operator
  tag: latest
  pullPolicy: Always

# VPC configuration
vpc:
  region: "us-south"
  id: ""
  resourceGroupID: ""

# Cluster identity
cluster:
  id: ""

# API key secret reference
credentials:
  secretName: roks-vpc-network-operator-credentials
  secretKey: IBMCLOUD_API_KEY

# Webhook TLS
webhook:
  port: 9443
  certDir: /tmp/k8s-webhook-server/serving-certs

# Operator container security context
operator:
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Leader election
leaderElection:
  enabled: true

# Orphan GC settings
gc:
  interval: 10m
  gracePeriod: 15m

# BFF service
bff:
  enabled: true
  image:
    repository: de.icr.io/roks/vpc-network-bff
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 8443
  apiKeySecretName: "ibm-vpc-api-key"
  csiMountPath: ""  # Set to mount path (e.g. /var/run/ibm-vpc-credentials) to enable CSI credential loading
  logLevel: "info"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  metrics:
    serviceMonitor:
      enabled: false

# Console plugin
consolePlugin:
  enabled: true
  hookImage: "registry.redhat.io/openshift4/ose-cli:latest"
  image:
    repository: de.icr.io/roks/vpc-network-console-plugin
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 9443
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# RBAC for console plugin users
pluginRbac:
  createAdminBinding: true
  adminGroups:
    - cluster-admins
    - ibm-admins
  createDeveloperBinding: false
  developerNamespaces: []
