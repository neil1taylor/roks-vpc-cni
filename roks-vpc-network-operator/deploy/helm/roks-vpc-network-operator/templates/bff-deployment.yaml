{{- if .Values.bff.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bff
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vpc-network-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: bff
spec:
  replicas: {{ .Values.bff.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vpc-network-bff
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpc-network-bff
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: bff
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Release.Name }}-bff
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
      - name: bff
        image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.image.tag }}"
        imagePullPolicy: {{ .Values.bff.image.pullPolicy }}
        ports:
        - name: https
          containerPort: {{ .Values.bff.port }}
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        env:
        - name: BFF_CLUSTER_MODE
          value: "{{ .Values.bff.clusterMode }}"
        - name: BFF_LISTEN_ADDR
          value: "0.0.0.0:{{ .Values.bff.port }}"
        - name: BFF_LOG_LEVEL
          value: "{{ .Values.bff.logLevel }}"
        - name: VPC_REGION
          value: "{{ .Values.vpc.region }}"
        - name: CLUSTER_ID
          value: "{{ .Values.cluster.id }}"
        {{- if eq .Values.bff.clusterMode "roks" }}
        - name: CSI_MOUNT_PATH
          value: "{{ .Values.bff.csiMountPath }}"
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: https
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.bff.resources.requests.cpu }}
            memory: {{ .Values.bff.resources.requests.memory }}
          limits:
            cpu: {{ .Values.bff.resources.limits.cpu }}
            memory: {{ .Values.bff.resources.limits.memory }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        {{- if eq .Values.bff.clusterMode "roks" }}
        - name: csi-credentials
          mountPath: {{ .Values.bff.csiMountPath }}
          readOnly: true
        {{- else }}
        - name: api-key-secret
          mountPath: /var/run/secrets/api-key
          readOnly: true
        {{- end }}
        - name: tmp
          mountPath: /tmp
      volumes:
      {{- if eq .Values.bff.clusterMode "roks" }}
      - name: csi-credentials
        csi:
          driver: ibm-vpc-credentials.roks.ibm.com
          readOnly: true
      {{- else }}
      - name: api-key-secret
        secret:
          secretName: {{ .Values.bff.apiKeySecretName }}
      {{- end }}
      - name: tmp
        emptyDir: {}
{{- end }}
