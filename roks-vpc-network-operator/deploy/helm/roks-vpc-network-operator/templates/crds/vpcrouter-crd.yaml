apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vpcrouters.vpc.roks.ibm.com
  labels:
    app.kubernetes.io/name: roks-vpc-network-operator
    app.kubernetes.io/managed-by: Helm
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: vpc.roks.ibm.com
  names:
    kind: VPCRouter
    listKind: VPCRouterList
    plural: vpcrouters
    singular: vpcrouter
    shortNames:
    - vrt
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Gateway
      type: string
      jsonPath: .spec.gateway
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Sync
      type: string
      jsonPath: .status.syncStatus
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    - name: IDS
      type: string
      jsonPath: .status.idsMode
      priority: 1
    - name: Mode
      type: string
      jsonPath: .spec.mode
      priority: 1
    schema:
      openAPIV3Schema:
        description: VPCRouter is the Schema for the vpcrouters API.
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: VPCRouterSpec defines the desired state of a VPCRouter.
            type: object
            required:
            - gateway
            - networks
            properties:
              gateway:
                description: Gateway is the name of the VPCGateway this router is associated with.
                type: string
                minLength: 1
              transit:
                description: Transit defines the transit network configuration for the router.
                type: object
                required:
                - address
                properties:
                  network:
                    description: Network is the name of the transit L2 network.
                    type: string
                  address:
                    description: Address is the IP address on the transit network.
                    type: string
                    minLength: 1
              networks:
                description: Networks is the list of workload networks attached to the router.
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                  - name
                  - address
                  properties:
                    name:
                      description: Name is the name of the network (CUDN or UDN).
                      type: string
                      minLength: 1
                    namespace:
                      description: Namespace where the network-attachment-definition exists.
                      type: string
                    address:
                      description: Address is the IP address on this network.
                      type: string
                      minLength: 1
                    dhcp:
                      description: Per-network DHCP overrides.
                      type: object
                      properties:
                        enabled:
                          description: Override global DHCP enabled setting for this network.
                          type: boolean
                        range:
                          description: Custom DHCP address range.
                          type: object
                          required:
                          - start
                          - end
                          properties:
                            start:
                              description: First IP address in the DHCP pool.
                              type: string
                            end:
                              description: Last IP address in the DHCP pool.
                              type: string
                        leaseTime:
                          description: Override global lease duration for this network.
                          type: string
                        reservations:
                          description: Static MAC to IP reservations.
                          type: array
                          items:
                            type: object
                            required:
                            - mac
                            - ip
                            properties:
                              mac:
                                description: "Hardware address (e.g. fa:16:3e:aa:bb:cc)."
                                type: string
                              ip:
                                description: "Reserved IP address (e.g. 10.100.0.50)."
                                type: string
                              hostname:
                                description: Optional hostname for the reservation.
                                type: string
                        dns:
                          description: Override global DNS settings for this network.
                          type: object
                          properties:
                            nameservers:
                              description: DNS server IP addresses (DHCP option 6).
                              type: array
                              items:
                                type: string
                            searchDomains:
                              description: DNS search domains (DHCP option 119).
                              type: array
                              items:
                                type: string
                            localDomain:
                              description: Local domain name for DHCP clients.
                              type: string
                        options:
                          description: Override global DHCP options for this network.
                          type: object
                          properties:
                            router:
                              description: Override default gateway (DHCP option 3).
                              type: string
                            mtu:
                              description: Interface MTU for DHCP clients (DHCP option 26).
                              type: integer
                              format: int32
                            ntpServers:
                              description: NTP server addresses (DHCP option 42).
                              type: array
                              items:
                                type: string
                            custom:
                              description: Raw dnsmasq --dhcp-option values for passthrough.
                              type: array
                              items:
                                type: string
              routeAdvertisement:
                description: RouteAdvertisement controls which routes the router advertises.
                type: object
                properties:
                  connectedSegments:
                    description: ConnectedSegments advertises routes for directly connected network segments.
                    type: boolean
                    default: true
                  staticRoutes:
                    description: StaticRoutes advertises configured static routes.
                    type: boolean
                    default: false
                  natIPs:
                    description: NATIPs advertises NAT-translated IP addresses.
                    type: boolean
                    default: false
              dhcp:
                description: DHCP controls DHCP server functionality on the router.
                type: object
                properties:
                  enabled:
                    description: Enabled controls whether the router acts as a DHCP server.
                    type: boolean
                    default: false
                  leaseTime:
                    description: "Default DHCP lease duration (e.g. 12h, 1h, 30m). Defaults to 12h."
                    type: string
                  dns:
                    description: DNS settings for DHCP responses.
                    type: object
                    properties:
                      nameservers:
                        description: DNS server IP addresses (DHCP option 6).
                        type: array
                        items:
                          type: string
                      searchDomains:
                        description: DNS search domains (DHCP option 119).
                        type: array
                        items:
                          type: string
                      localDomain:
                        description: Local domain name for DHCP clients.
                        type: string
                  options:
                    description: Additional DHCP options.
                    type: object
                    properties:
                      router:
                        description: Override default gateway (DHCP option 3).
                        type: string
                      mtu:
                        description: Interface MTU for DHCP clients (DHCP option 26).
                        type: integer
                        format: int32
                      ntpServers:
                        description: NTP server addresses (DHCP option 42).
                        type: array
                        items:
                          type: string
                      custom:
                        description: Raw dnsmasq --dhcp-option values for passthrough.
                        type: array
                        items:
                          type: string
                  leasePersistence:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      storageSize:
                        type: string
                        default: "100Mi"
                      storageClassName:
                        type: string
                  autoReservations:
                    type: boolean
                    default: false
              firewall:
                description: Firewall defines firewall rules for the router.
                type: object
                properties:
                  enabled:
                    description: Enabled controls whether the firewall is active.
                    type: boolean
                    default: false
                  rules:
                    description: Rules is the ordered list of firewall rules.
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      - action
                      - direction
                      - protocol
                      properties:
                        name:
                          description: Name is the human-readable name of this rule.
                          type: string
                          minLength: 1
                        action:
                          description: Action is the action to take when the rule matches.
                          type: string
                          enum:
                          - allow
                          - deny
                        direction:
                          description: Direction is the traffic direction this rule applies to.
                          type: string
                          enum:
                          - ingress
                          - egress
                        source:
                          description: Source is the source CIDR or address to match.
                          type: string
                        destination:
                          description: Destination is the destination CIDR or address to match.
                          type: string
                        protocol:
                          description: Protocol is the IP protocol to match.
                          type: string
                          enum:
                          - tcp
                          - udp
                          - icmp
                          - any
                          default: any
                        port:
                          description: Port is the port number to match (for TCP/UDP).
                          type: integer
                          format: int32
                        priority:
                          description: Priority controls the evaluation order (lower = higher priority).
                          type: integer
                          format: int32
                          default: 100
              ids:
                description: IDS configures the Suricata IDS/IPS sidecar container.
                type: object
                properties:
                  enabled:
                    description: Enabled controls whether the Suricata IDS/IPS sidecar is deployed.
                    type: boolean
                    default: false
                  mode:
                    description: "Mode selects the inspection mode: ids (passive) or ips (inline)."
                    type: string
                    enum:
                    - ids
                    - ips
                    default: ids
                  interfaces:
                    description: Interfaces selects which interfaces Suricata monitors.
                    type: string
                    enum:
                    - all
                    - uplink
                    - workload
                    default: all
                  customRules:
                    description: CustomRules contains additional Suricata rules (one rule per line).
                    type: string
                  syslogTarget:
                    description: SyslogTarget is an optional syslog destination (host:port) for EVE JSON alerts.
                    type: string
                  image:
                    description: Image overrides the default Suricata container image.
                    type: string
                  nfqueueNum:
                    description: NFQueueNum is the NFQUEUE number used in IPS mode.
                    type: integer
                    format: int32
                    default: 0
              metrics:
                description: Metrics configures the metrics exporter sidecar container.
                type: object
                properties:
                  enabled:
                    description: Enabled controls whether the metrics exporter sidecar is deployed.
                    type: boolean
                    default: false
                  port:
                    description: Port the metrics exporter listens on.
                    type: integer
                    format: int32
                    default: 9100
                  image:
                    description: Image overrides the default metrics exporter container image.
                    type: string
              pod:
                description: Pod defines pod-level overrides for the router pod.
                type: object
                properties:
                  image:
                    description: Image is the container image to use for the gateway/router pod.
                    type: string
                  resources:
                    description: Resources defines CPU and memory requests/limits for the router container.
                    type: object
                    properties:
                      requests:
                        type: object
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                      limits:
                        type: object
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                  nodeSelector:
                    description: NodeSelector constrains the router pod to nodes matching these labels.
                    type: object
                    additionalProperties:
                      type: string
                  tolerations:
                    description: Tolerations allows the router pod to schedule on tainted nodes.
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        value:
                          type: string
                        effect:
                          type: string
                        tolerationSeconds:
                          type: integer
                          format: int64
                  runtimeClassName:
                    description: RuntimeClassName specifies the RuntimeClass for CPU pinning or other runtime features.
                    type: string
                  priorityClassName:
                    description: PriorityClassName specifies the priority class for pod scheduling priority.
                    type: string
              mode:
                description: "Mode selects the router runtime: standard (bash init) or fast-path (Go binary + XDP)."
                type: string
                enum:
                - standard
                - fast-path
                default: standard
          status:
            description: VPCRouterStatus defines the observed state of a VPCRouter.
            type: object
            properties:
              phase:
                description: Phase is the current lifecycle phase of the router.
                type: string
                enum:
                - Pending
                - Provisioning
                - Ready
                - Error
              podIP:
                description: PodIP is the cluster IP address of the router pod.
                type: string
              idsMode:
                description: "IDSMode reports the active IDS/IPS mode (ids, ips, or empty if disabled)."
                type: string
              metricsEnabled:
                description: MetricsEnabled reports whether the metrics exporter sidecar is active.
                type: boolean
              mode:
                description: "Mode reports the active router mode."
                type: string
              xdpEnabled:
                description: "XDPEnabled reports whether XDP fast-path forwarding is active."
                type: boolean
              leasePersistenceReady:
                type: boolean
              transitIP:
                description: TransitIP is the router's IP address on the transit network.
                type: string
              networks:
                description: Networks reports the status of each attached network.
                type: array
                items:
                  type: object
                  properties:
                    name:
                      description: Name is the network name.
                      type: string
                    address:
                      description: Address is the router's IP address on this network.
                      type: string
                    connected:
                      description: Connected indicates whether the router has connectivity to this network.
                      type: boolean
                    dhcp:
                      description: DHCP status of this network.
                      type: object
                      properties:
                        enabled:
                          description: Whether DHCP is active on this network.
                          type: boolean
                        poolStart:
                          description: First IP in the DHCP range.
                          type: string
                        poolEnd:
                          description: Last IP in the DHCP range.
                          type: string
                        reservationCount:
                          description: Number of static reservations configured.
                          type: integer
                          format: int32
                        autoReservationCount:
                          type: integer
              advertisedRoutes:
                description: AdvertisedRoutes is the list of routes the router is currently advertising.
                type: array
                items:
                  type: string
              syncStatus:
                description: SyncStatus indicates whether the CR is in sync with the VPC API.
                type: string
                enum:
                - Synced
                - Pending
                - Failed
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful sync.
                type: string
                format: date-time
              message:
                description: Message provides human-readable detail about the current status.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
                  required:
                  - type
                  - status
                  - lastTransitionTime
                  - reason
                  - message
