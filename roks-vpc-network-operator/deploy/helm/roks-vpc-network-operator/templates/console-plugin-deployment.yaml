{{- if .Values.consolePlugin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-console-plugin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vpc-network-console-plugin
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: console-plugin
spec:
  replicas: {{ .Values.consolePlugin.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vpc-network-console-plugin
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpc-network-console-plugin
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: console-plugin
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: "{{ .Values.consolePlugin.image.repository }}:{{ .Values.consolePlugin.image.tag }}"
        imagePullPolicy: {{ .Values.consolePlugin.image.pullPolicy }}
        ports:
        - name: https
          containerPort: {{ .Values.consolePlugin.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: https
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: https
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.consolePlugin.resources.requests.cpu }}
            memory: {{ .Values.consolePlugin.resources.requests.memory }}
          limits:
            cpu: {{ .Values.consolePlugin.resources.limits.cpu }}
            memory: {{ .Values.consolePlugin.resources.limits.memory }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: serving-cert
          mountPath: /etc/nginx/ssl
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: serving-cert
        secret:
          secretName: {{ .Release.Name }}-console-plugin-serving-cert
          optional: true
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
{{- end }}
