apiVersion: apps/v1
kind: Deployment
metadata:
  name: roks-vpc-network-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app: roks-vpc-network-operator
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: roks-vpc-network-operator
  template:
    metadata:
      labels:
        app: roks-vpc-network-operator
    spec:
      serviceAccountName: roks-vpc-network-operator
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.webhook.port }}
          name: webhook
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        env:
        - name: IBMCLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.credentials.secretName }}
              key: {{ .Values.credentials.secretKey }}
        - name: VPC_REGION
          value: {{ .Values.vpc.region | quote }}
        - name: CLUSTER_ID
          value: {{ .Values.cluster.id | quote }}
        - name: RESOURCE_GROUP_ID
          value: {{ .Values.vpc.resourceGroupID | quote }}
        - name: VPC_ID
          value: {{ .Values.vpc.id | quote }}
        - name: CLUSTER_MODE
          value: "unmanaged"  # Always VPC API until ROKS platform API ships
        - name: ROUTER_POD_IMAGE
          value: {{ ((.Values.routerPod).image) | default "quay.io/fedora/fedora:40" | quote }}
        - name: METRICS_EXPORTER_IMAGE
          value: {{ .Values.metricsExporter.image | quote }}
        - name: NNCP_ENABLED
          value: {{ .Values.nncp.enabled | quote }}
        - name: NNCP_BRIDGE_NAME
          value: {{ .Values.nncp.bridgeName | quote }}
        - name: NNCP_SECONDARY_NIC
          value: {{ .Values.nncp.secondaryNIC | quote }}
        - name: NNCP_NODE_SELECTOR
          value: {{ .Values.nncp.nodeSelector | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: webhook-certs
          mountPath: {{ .Values.webhook.certDir }}
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: webhook-certs
        secret:
          secretName: roks-vpc-network-operator-webhook-tls
      - name: tmp
        emptyDir: {}
