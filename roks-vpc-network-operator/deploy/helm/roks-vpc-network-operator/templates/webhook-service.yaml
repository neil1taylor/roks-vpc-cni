apiVersion: v1
kind: Service
metadata:
  name: roks-vpc-network-operator-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: roks-vpc-network-operator
    app.kubernetes.io/name: roks-vpc-network-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: webhook
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: roks-vpc-network-operator-webhook-tls
spec:
  ports:
  - port: 443
    targetPort: {{ .Values.webhook.port | default 9443 }}
    protocol: TCP
    name: https
  selector:
    app: roks-vpc-network-operator
