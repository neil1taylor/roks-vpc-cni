apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vlanattachments.vpc.roks.ibm.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
spec:
  group: vpc.roks.ibm.com
  names:
    kind: VLANAttachment
    listKind: VLANAttachmentList
    plural: vlanattachments
    shortNames:
    - vla
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: VLANAttachment is the Schema for the vlanattachments API. It represents a VLAN interface attachment on a bare metal server.
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase.'
            type: string
          metadata:
            type: object
          spec:
            description: VLANAttachmentSpec defines the desired state of a VLAN attachment.
            type: object
            required:
            - bmServerID
            - vlanID
            - subnetRef
            properties:
              bmServerID:
                description: BMServerID is the bare metal server ID to attach the VLAN to.
                type: string
                minLength: 1
              vlanID:
                description: VLANID is the VLAN tag for the attachment.
                type: integer
                format: int64
                minimum: 1
                maximum: 4094
              subnetRef:
                description: SubnetRef is the name of the VPCSubnet CR this attachment is associated with.
                type: string
              subnetID:
                description: SubnetID is the VPC subnet ID (alternative to SubnetRef).
                type: string
              allowToFloat:
                description: AllowToFloat enables the VLAN attachment to float during live migration.
                type: boolean
                default: true
              nodeName:
                description: NodeName is the Kubernetes node name corresponding to the bare metal server.
                type: string
          status:
            description: VLANAttachmentStatus defines the observed state of a VLAN attachment.
            type: object
            properties:
              syncStatus:
                description: SyncStatus indicates whether the CR is in sync with the VPC API.
                type: string
                enum:
                - Synced
                - Pending
                - Failed
              attachmentID:
                description: AttachmentID is the VPC-assigned VLAN attachment ID.
                type: string
              attachmentStatus:
                description: AttachmentStatus is the current status of the attachment.
                type: string
                enum:
                - attached
                - pending
                - detached
                - failed
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful sync.
                type: string
                format: date-time
              message:
                description: Message provides human-readable detail about the current status.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                type: array
                items:
                  description: "Condition contains details for one aspect of the current state of this API Resource."
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another.
                      type: string
                      format: date-time
                    message:
                      description: message is a human readable message indicating details about the transition.
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon.
                      type: integer
                      format: int64
                      minimum: 0
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      type: string
                      maxLength: 1024
                      minLength: 1
                      pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                      maxLength: 316
                      pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Z]|[a-z0-9])([-A-Z0-9_a-z0-9]*([-A-Z0-9_a-z0-9])?))$'
    additionalPrinterColumns:
    - name: BM Server
      type: string
      jsonPath: .spec.bmServerID
    - name: VLAN
      type: integer
      jsonPath: .spec.vlanID
    - name: Node
      type: string
      jsonPath: .spec.nodeName
    - name: Status
      type: string
      jsonPath: .status.attachmentStatus
    - name: Sync
      type: string
      jsonPath: .status.syncStatus
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
