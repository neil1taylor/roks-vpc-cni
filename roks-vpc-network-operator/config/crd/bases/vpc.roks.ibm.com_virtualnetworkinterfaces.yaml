apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualnetworkinterfaces.vpc.roks.ibm.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
spec:
  group: vpc.roks.ibm.com
  names:
    kind: VirtualNetworkInterface
    listKind: VirtualNetworkInterfaceList
    plural: virtualnetworkinterfaces
    shortNames:
    - vni
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: VirtualNetworkInterface is the Schema for the virtualnetworkinterfaces API. It represents a VPC Virtual Network Interface managed by the operator.
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase.'
            type: string
          metadata:
            type: object
          spec:
            description: VNISpec defines the desired state of a Virtual Network Interface.
            type: object
            required:
            - subnetRef
            properties:
              subnetRef:
                description: SubnetRef is the name of the VPCSubnet CR this VNI belongs to.
                type: string
                minLength: 1
              subnetID:
                description: SubnetID is the VPC subnet ID (alternative to SubnetRef for direct ID reference).
                type: string
              securityGroupIDs:
                description: SecurityGroupIDs is a list of VPC security group IDs to associate with this VNI.
                type: array
                items:
                  type: string
              allowIPSpoofing:
                description: AllowIPSpoofing enables IP spoofing on the VNI (required for KubeVirt VMs).
                type: boolean
                default: true
              enableInfrastructureNat:
                description: EnableInfrastructureNat controls whether infrastructure NAT is enabled. Set to false for VMs that need their own routable IP.
                type: boolean
                default: false
              autoDelete:
                description: AutoDelete controls whether the VNI is deleted when its target is removed. Set to false for KubeVirt VMs to survive live migration.
                type: boolean
                default: false
              vmRef:
                description: VMRef is a reference to the KubeVirt VirtualMachine this VNI is bound to.
                type: object
                properties:
                  namespace:
                    description: Namespace of the VirtualMachine.
                    type: string
                  name:
                    description: Name of the VirtualMachine.
                    type: string
              clusterID:
                description: ClusterID is the ROKS cluster ID, used for tagging.
                type: string
          status:
            description: VNIStatus defines the observed state of a Virtual Network Interface.
            type: object
            properties:
              syncStatus:
                description: SyncStatus indicates whether the CR is in sync with the VPC API.
                type: string
                enum:
                - Synced
                - Pending
                - Failed
              vniID:
                description: VNIID is the VPC-assigned Virtual Network Interface ID.
                type: string
              macAddress:
                description: MACAddress is the VPC-generated MAC address for this VNI.
                type: string
              primaryIPv4:
                description: PrimaryIPv4 is the primary reserved IP address on the VNI.
                type: string
              reservedIPID:
                description: ReservedIPID is the VPC reserved IP resource ID.
                type: string
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful sync.
                type: string
                format: date-time
              message:
                description: Message provides human-readable detail about the current status.
                type: string
              conditions:
                description: Conditions represent the latest available observations of the VNI's state.
                type: array
                items:
                  description: "Condition contains details for one aspect of the current state of this API Resource."
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another.
                      type: string
                      format: date-time
                    message:
                      description: message is a human readable message indicating details about the transition.
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon.
                      type: integer
                      format: int64
                      minimum: 0
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      type: string
                      maxLength: 1024
                      minLength: 1
                      pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                      maxLength: 316
                      pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Z]|[a-z0-9])([-A-Z0-9_a-z0-9]*([-A-Z0-9_a-z0-9])?))$'
    additionalPrinterColumns:
    - name: VNI ID
      type: string
      jsonPath: .status.vniID
    - name: MAC
      type: string
      jsonPath: .status.macAddress
    - name: IP
      type: string
      jsonPath: .status.primaryIPv4
    - name: Subnet
      type: string
      jsonPath: .spec.subnetRef
    - name: Sync
      type: string
      jsonPath: .status.syncStatus
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
