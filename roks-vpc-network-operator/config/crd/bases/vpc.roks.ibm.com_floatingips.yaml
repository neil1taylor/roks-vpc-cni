apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: floatingips.vpc.roks.ibm.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
spec:
  group: vpc.roks.ibm.com
  names:
    kind: FloatingIP
    listKind: FloatingIPList
    plural: floatingips
    shortNames:
    - fip
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: FloatingIP is the Schema for the floatingips API. It represents a VPC floating IP managed by the operator.
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase.'
            type: string
          metadata:
            type: object
          spec:
            description: FloatingIPSpec defines the desired state of a Floating IP.
            type: object
            required:
            - zone
            properties:
              zone:
                description: Zone is the VPC zone for the floating IP (e.g., "us-south-1").
                type: string
                minLength: 1
              vniRef:
                description: VNIRef is the name of the VirtualNetworkInterface CR to bind this FIP to.
                type: string
              vniID:
                description: VNIID is the VPC VNI ID to bind to (alternative to VNIRef).
                type: string
              name:
                description: Name is the desired name for the floating IP in VPC.
                type: string
          status:
            description: FloatingIPStatus defines the observed state of a Floating IP.
            type: object
            properties:
              syncStatus:
                description: SyncStatus indicates whether the CR is in sync with the VPC API.
                type: string
                enum:
                - Synced
                - Pending
                - Failed
              fipID:
                description: FIPID is the VPC-assigned floating IP resource ID.
                type: string
              address:
                description: Address is the allocated public IP address.
                type: string
              targetVNIID:
                description: TargetVNIID is the VNI this FIP is currently bound to.
                type: string
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful sync.
                type: string
                format: date-time
              message:
                description: Message provides human-readable detail about the current status.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                type: array
                items:
                  description: "Condition contains details for one aspect of the current state of this API Resource."
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another.
                      type: string
                      format: date-time
                    message:
                      description: message is a human readable message indicating details about the transition.
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon.
                      type: integer
                      format: int64
                      minimum: 0
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      type: string
                      maxLength: 1024
                      minLength: 1
                      pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                      maxLength: 316
                      pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Z]|[a-z0-9])([-A-Z0-9_a-z0-9]*([-A-Z0-9_a-z0-9])?))$'
    additionalPrinterColumns:
    - name: Address
      type: string
      jsonPath: .status.address
    - name: Zone
      type: string
      jsonPath: .spec.zone
    - name: VNI
      type: string
      jsonPath: .spec.vniRef
    - name: Sync
      type: string
      jsonPath: .status.syncStatus
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
