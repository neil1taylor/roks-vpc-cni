apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: roks-vpc-network-operator
rules:
# ClusterUserDefinedNetwork access
- apiGroups: ["k8s.ovn.org"]
  resources: ["clusteruserdefinednetworks"]
  verbs: ["get", "list", "watch", "update", "patch"]
# VirtualMachine access
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachines"]
  verbs: ["get", "list", "watch", "update", "patch"]
# Node access (read-only)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# Secret access (for VPC API key)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
# Events (for status reporting)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
